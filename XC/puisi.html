<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="/main/asset/image/logo/logo.ico" type="image/x-icon" />
<title>Puisi XC | 9th Batch</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --sky-top: #56c3f5;
    --sky-bottom: #ffe0b2;
    --sun-color: #ffd666;
    --sun-glow: rgba(255,214,102,0.55);
    --sun-top: 6%;
    --sun-opacity: 1;
    --moon-opacity: 0;
    --star-opacity: 0;
    --cream: #f4ecdb;
    --ink-cream: #1a1a2e;
    --ink-cream-soft: rgba(20,20,35,0.68);
    --ink-dark: #1e2430;
    --ink-dark-soft: rgba(30,36,48,0.62);
    --gold: #c9954a;
    --gold-bright: #b9782f;
    --hairline: rgba(30,36,48,0.14);
    --hairline-light: rgba(255,255,255,0.18);
    --panel-on-sky: rgba(20,20,35,0.06);
  }

  *{ box-sizing: border-box; }
  html{ scroll-behavior: auto; }

  body{
    margin:0;
    font-family:'Jost', sans-serif;
    color: var(--ink-cream);
    overflow-x: hidden;
  }

  .sky{
    position: fixed; inset:0; z-index:-3;
    background: linear-gradient(to bottom, var(--sky-top) 0%, var(--sky-bottom) 100%);
  }
  .stars{
    position: fixed; inset:0; z-index:-2;
    opacity: var(--star-opacity);
    background-image:
      radial-gradient(1.5px 1.5px at 8% 12%, #fff, transparent),
      radial-gradient(1px 1px at 18% 34%, #fff, transparent),
      radial-gradient(2px 2px at 29% 6%, #fff, transparent),
      radial-gradient(1px 1px at 41% 52%, #fff, transparent),
      radial-gradient(1.5px 1.5px at 53% 18%, #fff, transparent),
      radial-gradient(1px 1px at 64% 68%, #fff, transparent),
      radial-gradient(2px 2px at 74% 30%, #fff, transparent),
      radial-gradient(1.5px 1.5px at 82% 58%, #fff, transparent),
      radial-gradient(1px 1px at 91% 10%, #fff, transparent),
      radial-gradient(1.5px 1.5px at 4% 74%, #fff, transparent),
      radial-gradient(1px 1px at 13% 48%, #fff, transparent),
      radial-gradient(1.5px 1.5px at 35% 82%, #fff, transparent),
      radial-gradient(1px 1px at 47% 28%, #fff, transparent),
      radial-gradient(2px 2px at 59% 88%, #fff, transparent),
      radial-gradient(1px 1px at 70% 46%, #fff, transparent),
      radial-gradient(1.5px 1.5px at 87% 80%, #fff, transparent),
      radial-gradient(1px 1px at 96% 42%, #fff, transparent);
    background-repeat: no-repeat;
    animation: twinkle 4.5s ease-in-out infinite alternate;
  }
  @keyframes twinkle{ from{ filter:brightness(.85);} to{ filter:brightness(1.2);} }

  .sun-wrap{
    position: fixed; left:0; right:0; top: var(--sun-top); z-index:-1;
    display:flex; justify-content:center; opacity: var(--sun-opacity);
  }
  .sun{
    width:104px; height:104px; border-radius:50%;
    background: var(--sun-color);
    box-shadow: 0 0 60px 20px var(--sun-glow), 0 0 130px 60px var(--sun-glow);
  }

  .moon-wrap{
    position: fixed; left:0; right:0; top: var(--sun-top); z-index:-1;
    display:flex; justify-content:center; opacity: var(--moon-opacity);
    pointer-events:none;
  }
  .moon{
    position:relative; width:78px; height:78px; border-radius:50%;
    background:#f4f1e4;
    box-shadow: 0 0 50px 16px rgba(244,241,228,0.3);
    overflow:hidden;
  }
  .moon::after{
    content:""; position:absolute; top:-10px; left:22px;
    width:78px; height:78px; border-radius:50%;
    background: var(--sky-top);
  }

  main{ position:relative; z-index:1; }

  header.hero{
    position:relative; overflow:hidden;
    min-height: 100vh;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; padding: 6rem 1.5rem 4rem;
  }
  .birds{ position:absolute; inset:0; z-index:-1; overflow:hidden; pointer-events:none; }
  .bird{
    position:absolute; left:-8%; width:26px; height:26px;
    color: rgba(26,26,46,0.5);
    animation-name: flyAcross; animation-timing-function: linear; animation-iteration-count: infinite;
  }
  .bird svg{ width:100%; height:100%; display:block; animation: flap 0.55s ease-in-out infinite alternate; }
  @keyframes flyAcross{ from{ transform: translateX(0) translateY(0); } to{ transform: translateX(125vw) translateY(-18px); } }
  @keyframes flap{ from{ transform: scaleY(1); } to{ transform: scaleY(0.55); } }
  .hero-cloud{
    position:absolute; border-radius:50%;
    background: rgba(255,255,255,0.55);
    filter: blur(10px);
    animation-name: driftHeroCloud; animation-timing-function: linear; animation-iteration-count: infinite;
  }
  @keyframes driftHeroCloud{ from{ transform: translateX(-25%); } to{ transform: translateX(130vw); } }
  .eyebrow{
    font-family:'Cormorant Garamond', serif; font-style:italic; font-weight:500;
    color: var(--gold-bright); font-size: clamp(0.95rem,2.6vw,1.15rem);
    letter-spacing:0.03em; margin-bottom:1.4rem;
  }
  h1.hero-title{
    font-family:'Cormorant Garamond', serif; font-weight:700;
    font-size: clamp(2.6rem, 9vw, 4.4rem); line-height:1.08; margin:0;
    animation: titleColorShift 6s ease-in-out infinite;
  }
  @keyframes titleColorShift{
    0%   { color: #ff4fa3; }
    33%  { color: #ff8c1a; }
    66%  { color: #3fa9ff; }
    100% { color: #ff4fa3; }
  }
  .hero-desc{
    max-width: 30ch; margin: 1.6rem auto 0;
    color: var(--ink-cream-soft); font-weight:400;
    font-size: clamp(0.95rem, 2.6vw, 1.05rem); line-height:1.7;
  }
  .stats{
    display:flex; align-items:center; justify-content:center; gap:1.6rem;
    margin-top: 3rem;
  }
  .stats .stat{ font-size:0.8rem; letter-spacing:0.08em; color: var(--ink-cream-soft); }
  .stats .stat b{ color: var(--gold-bright); font-size:1.05rem; font-weight:600; }
  .scroll-hint{
    margin-top: 3.2rem; font-size:0.75rem; letter-spacing:0.15em;
    color: var(--ink-cream-soft); animation: bob 2.2s ease-in-out infinite;
  }
  @keyframes bob{ 0%,100%{ transform:translateY(0); opacity:.65;} 50%{ transform:translateY(7px); opacity:1;} }

  .manifes{
    position:relative; background: var(--cream); color: var(--ink-dark);
    padding: 5rem 1.5rem 4rem;
  }
  .manifes-inner{ max-width: 560px; margin:0 auto; }
  .seam{ display:flex; align-items:center; justify-content:center; gap:0.9rem; margin-bottom:2.4rem; }
  .seam-line{ flex:1; max-width:110px; height:1px; background:linear-gradient(to right, transparent, var(--gold), transparent); }
  .manifes h2{
    font-family:'Cormorant Garamond', serif; font-weight:700;
    font-size: clamp(1.9rem, 6vw, 2.4rem); text-align:center; margin: 0 0 0.9rem;
  }
  .manifes-desc{
    text-align:center; color: var(--ink-dark-soft); font-weight:400;
    max-width: 34ch; margin: 0 auto 2.2rem; line-height:1.65;
    font-size: clamp(0.9rem, 2.4vw, 1rem);
  }
  #searchInput{
    display:block; width:100%; padding: 0.95rem 1.3rem; margin-bottom: 2.4rem;
    border-radius: 999px; border: 1px solid var(--hairline);
    background: #fbf7ee; color: var(--ink-dark); font-family:'Jost',sans-serif;
    font-size: 0.95rem; outline:none;
  }
  #searchInput:focus{ border-color: var(--gold); }
  #searchInput::placeholder{ color: rgba(30,36,48,0.4); }

  .toc-row{
    display:flex; align-items:center; gap:1rem;
    padding: 1.15rem 0; border-bottom: 1px solid var(--hairline);
    text-decoration:none; color:inherit;
  }
  .toc-row:last-child{ border-bottom:none; }
  .toc-num{
    font-family:'Cormorant Garamond', serif; font-weight:600; color: var(--gold-bright);
    font-size:1.15rem; width: 2rem; flex-shrink:0;
  }
  .toc-thumb{
    width:52px; height:64px; flex-shrink:0; background:#fff; padding:3px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.15);
  }
  .toc-thumb img, .thumb-ph{ width:100%; height:100%; object-fit:cover; display:block; }
  .thumb-ph{ border:1.3px dashed rgba(30,36,48,0.28); }
  .toc-text{ display:flex; flex-direction:column; gap:0.2rem; min-width:0; }
  .toc-title{
    font-family:'Cormorant Garamond', serif; font-weight:600;
    font-size: clamp(1.05rem, 3vw, 1.2rem); line-height:1.3;
  }
  .toc-author{
    font-family:'Cormorant Garamond', serif; font-style:italic; font-weight:400;
    color: var(--ink-dark-soft); font-size:0.92rem;
  }
  .ph{ opacity:0.4; }
  #emptyMsg{
    display:none; text-align:center; padding:2rem 0; color: var(--ink-dark-soft);
    font-style:italic; font-family:'Cormorant Garamond', serif;
  }
  .poem{
    max-width: 560px; margin: 0 auto; padding: 5.5rem 1.5rem 4rem;
    text-align:center; color: var(--ink-cream);
  }
  .poem-topbar{
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom: 3rem;
  }
  .pill{
    display:inline-block; padding: 0.6rem 1.2rem; border-radius:999px;
    border:1px solid var(--hairline-light); color: var(--ink-cream-soft);
    text-decoration:none; font-size:0.82rem; letter-spacing:0.02em;
  }
  .pill:hover{ border-color: var(--gold); color: var(--gold-bright); }
  .counter{ font-size:0.85rem; color: var(--ink-cream-soft); letter-spacing:0.04em; }

  .photo-frame{
    width: min(300px, 76vw); margin: 0 auto; background:#f4f1ea;
    padding: 12px 12px 30px; box-shadow: 0 18px 40px rgba(0,0,0,0.25);
  }
  .photo-inner{
    width:100%; aspect-ratio: 4/5; overflow:hidden;
    background: linear-gradient(135deg,#dcd3bd,#efe7d3);
  }
  .photo-inner img{ width:100%; height:100%; object-fit:cover; display:block; }
  .photo-placeholder{
    width:100%; height:100%; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:0.6rem;
    border: 1.5px dashed rgba(30,36,48,0.28); color: rgba(30,36,48,0.4);
  }
  .photo-placeholder span{
    font-size:0.68rem; letter-spacing:0.12em; text-transform:uppercase;
  }
  .photo-credit{
    margin-top:0.7rem; font-size:0.72rem; letter-spacing:0.05em;
    color: var(--ink-cream-soft);
  }

  .poem .eyebrow{ margin-top: 2.6rem; margin-bottom:0.6rem; }
  .poem-title{
    font-family:'Cormorant Garamond', serif; font-weight:700;
    font-size: clamp(1.9rem, 7vw, 2.7rem); margin:0; line-height:1.15;
  }
  .poem-author{
    font-family:'Cormorant Garamond', serif; font-style:italic; font-weight:400;
    color: var(--ink-cream-soft); font-size:1.05rem; margin-top:0.5rem;
  }
  .poem .scroll-hint{ margin-top:2.4rem; }

  .poem-card{
    position:relative; overflow:hidden;
    margin: 3rem auto 0; max-width: 36ch;
    background-color: #05050f;
    background-image:
      radial-gradient(1.4px 1.4px at 12% 18%, #fff, transparent),
      radial-gradient(1px 1px at 28% 55%, #fff, transparent),
      radial-gradient(1.6px 1.6px at 45% 12%, #fff, transparent),
      radial-gradient(1px 1px at 60% 70%, #fff, transparent),
      radial-gradient(1.3px 1.3px at 75% 30%, #fff, transparent),
      radial-gradient(1px 1px at 85% 60%, #fff, transparent),
      radial-gradient(1.5px 1.5px at 92% 15%, #fff, transparent),
      radial-gradient(1px 1px at 18% 80%, #fff, transparent),
      radial-gradient(1.2px 1.2px at 55% 88%, #fff, transparent),
      radial-gradient(ellipse at 25% 25%, rgba(120,70,180,0.5) 0%, transparent 55%),
      radial-gradient(ellipse at 75% 70%, rgba(50,90,190,0.4) 0%, transparent 55%),
      linear-gradient(160deg, #15152f 0%, #05050f 70%);
    background-repeat: no-repeat;
    border: 2px solid #ff4fa3;
    border-radius: 6px;
    padding: 2.6rem 1.8rem;
    animation: cardBorderShift 6s ease-in-out infinite;
  }
  @keyframes cardBorderShift{
    0%   { border-color: #ff4fa3; box-shadow: 0 0 22px 2px rgba(255,79,163,0.45), 0 10px 30px rgba(0,0,0,0.4); }
    33%  { border-color: #ff8c1a; box-shadow: 0 0 22px 2px rgba(255,140,26,0.45), 0 10px 30px rgba(0,0,0,0.4); }
    66%  { border-color: #3fa9ff; box-shadow: 0 0 22px 2px rgba(63,169,255,0.45), 0 10px 30px rgba(0,0,0,0.4); }
    100% { border-color: #ff4fa3; box-shadow: 0 0 22px 2px rgba(255,79,163,0.45), 0 10px 30px rgba(0,0,0,0.4); }
  }
  .card-clouds{ position:absolute; inset:0; z-index:-1; overflow:hidden; pointer-events:none; }
  .cloud{
    position:absolute; border-radius:50%; background: rgba(255,255,255,0.07);
    filter: blur(9px);
    animation-name: driftCloud; animation-timing-function: linear; animation-iteration-count: infinite;
  }
  @keyframes driftCloud{ from{ transform: translateX(-40%); } to{ transform: translateX(140%); } }
  .stanza-block{
    font-family:'Cormorant Garamond', serif; font-style:italic;
    font-size: clamp(1.12rem, 3.2vw, 1.4rem); line-height:1.85;
    color: #f4ecdb; opacity:0.22; transform: translateY(18px);
    transition: opacity .8s ease, transform .8s ease; margin: 0 0 1.9rem;
  }
  .stanza-block:last-child{ margin-bottom:0; }
  .stanza-block.visible{ opacity:1; transform:translateY(0); }
  .stanza-block.ph-stanza{ opacity:0.5; }

  .poem-nav{
    display:flex; align-items:center; justify-content:space-between;
    margin-top: 3.2rem; font-size:0.78rem; letter-spacing:0.06em;
  }
  .poem-nav a{ color: var(--ink-cream-soft); text-decoration:none; }
  .poem-nav a:hover{ color: var(--gold-bright); }
  .poem-nav span{ flex:1; }

  .moon-spacer{ height: 22vh; }
  .message-section{
    max-width: 560px; margin: 0 auto; padding: 1rem 1.5rem 2rem;
    text-align:center; color: var(--ink-cream);
  }
  .message-title{
    font-family:'Cormorant Garamond', serif; font-weight:700;
    font-size: clamp(1.7rem, 6vw, 2.2rem); margin: 0 0 0.5rem;
  }
  .message-text{
    font-family:'Cormorant Garamond', serif; font-style:italic;
    font-size: clamp(1.05rem, 3vw, 1.25rem); line-height:1.85;
    color: #f4ecdb; white-space: pre-line;
  }

  footer{
    padding: 5rem 1.5rem 4rem; text-align:center; color:#f4f1ea;
  }
  footer .title{
    font-family:'Cormorant Garamond', serif; font-style:italic;
    font-size: clamp(1.4rem, 4vw, 1.9rem); margin-bottom:0.7rem;
  }
  footer .credit{
    font-size:0.75rem; letter-spacing:0.15em; text-transform:uppercase;
    color: rgba(244,241,234,0.65); margin-bottom:2.2rem;
  }
  footer a.top-link{
    color: var(--gold-bright); text-decoration:none; font-size:0.8rem; letter-spacing:0.06em;
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation:none !important; transition:none !important; }
  }

  #home {
    display: flex;
    justify-content: center;
    margin-top: 20px;
    margin-bottom: 20px;
  }

  #home a {
    background-color: #46B83D;
    color: white;
    padding: 10px 20px;
    border-radius: 5px;
    text-decoration: none;
  }

  #home a:hover {
    background-color: #389431;
  }
</style>
</head>

<script>
  const config = {
    eyebrow: "Antologi Puisi · Kelas XC · Tahun Ajaran 2025/2026",
    title: "<br>Kaleidoskop Kehidupan",
    description: "Kumpulan Puisi Karya Siswa Siswi Kelas XC Tahun 2025/2026",
    angkatanLabel: "ANGKATAN",
    angkatanNumber: "9",
    heroScrollHint: "geser untuk melihat daftar puisi ↓",
    manifesTitle: "Kaleidoskop Kehidupan",
    manifesDesc: "Setiap puisi adalah karya murid 10C :). Klik salah satu judul untuk mulai membaca.",
    backLabel: "← Kembali ke awal",
    poemScrollHint: "geser untuk membaca ↓",
    footerTitle: "— X.Celestial —",
    footerCredit: "Antologi Puisi · Kelas XC",
    messageText: "Terima Kasih telah Melihat Karya Kami :)"

  const poems = [

    { title:"Dalam Sujud Malamku", author:"Ayu Syifa Azzahra", image:"", imageCredit:"Sumber : Google", text:`Di sepertiga malam aku menyepi,

  function escapeHtml(str){
    return String(str || "").replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
  function displayOrPlaceholder(value, placeholder){
    const v = (value || '').trim();
    return v ? escapeHtml(v) : `<span class="ph">${placeholder}</span>`;
  }
  function renderPoemText(text){
    const trimmed = (text || '').trim();
    if(!trimmed){
      return `<p class="stanza-block ph-stanza">Tulis bait pertama di sini…<br>Pisahkan tiap bait dengan satu baris kosong.</p>`;
    }
    return trimmed.split(/\n\s*\n/).map(st => {
      const lines = escapeHtml(st.trim()).split('\n').join('<br>');
      return `<p class="stanza-block">${lines}</p>`;
    }).join('');
  }

  function renderTocRow(poem, idx){
    const num = String(idx + 1).padStart(2, '0');
    const titleHtml = displayOrPlaceholder(poem.title, `Judul Puisi ${num}`);
    const authorHtml = displayOrPlaceholder(poem.author, 'Nama Penulis');
    const thumb = poem.image
      ? `<img src="${escapeHtml(poem.image)}" alt="">`
      : `<div class="thumb-ph"></div>`;
    return `
      <a class="toc-row" href="#puisi-${num}" data-title="${escapeHtml((poem.title||'').toLowerCase())}" data-author="${escapeHtml((poem.author||'').toLowerCase())}">
        <span class="toc-num">${num}</span>
        <span class="toc-thumb">${thumb}</span>
        <span class="toc-text">
          <span class="toc-title">${titleHtml}</span>
          <span class="toc-author">${authorHtml}</span>
        </span>
      </a>`;
  }

  function renderPoemSection(poem, idx, total){
    const num = String(idx + 1).padStart(2, '0');
    const prevNum = idx > 0 ? String(idx).padStart(2, '0') : null;
    const nextNum = idx < total - 1 ? String(idx + 2).padStart(2, '0') : null;
    const photoHtml = poem.image
      ? `<img src="${escapeHtml(poem.image)}" alt="${escapeHtml(poem.title||'')}">`
      : `<div class="photo-placeholder">
           <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3">
             <rect x="3" y="6" width="18" height="14" rx="1.5"/><circle cx="12" cy="13" r="3.2"/><path d="M8 6l1.5-2h5L16 6"/>
           </svg>
           <span>Tempel foto di sini</span>
         </div>`;
    return `
      <section class="poem" id="puisi-${num}">
        <div class="poem-topbar">
          <a class="pill" href="#manifes">${config.backLabel}</a>
          <span class="counter">${idx + 1} / ${total}</span>
        </div>
        <div class="photo-frame"><div class="photo-inner">${photoHtml}</div></div>
        ${poem.imageCredit ? `<div class="photo-credit">${escapeHtml(poem.imageCredit)}</div>` : ''}
        <div class="eyebrow">Entri No. ${num}</div>
        <h2 class="poem-title">${displayOrPlaceholder(poem.title, `Judul Puisi ${num}`)}</h2>
        <div class="poem-author">${displayOrPlaceholder(poem.author, 'Nama Penulis')}</div>
        <div class="scroll-hint">${escapeHtml(config.poemScrollHint)}</div>
        <div class="poem-card">
          <div class="card-clouds" aria-hidden="true">
            <span class="cloud" style="top:15%; width:70px; height:26px; animation-duration:22s; animation-delay:0s;"></span>
            <span class="cloud" style="top:45%; width:50px; height:20px; animation-duration:17s; animation-delay:4s;"></span>
            <span class="cloud" style="top:70%; width:60px; height:22px; animation-duration:25s; animation-delay:9s;"></span>
          </div>
          ${renderPoemText(poem.text)}
        </div>
        <div class="poem-nav">
          ${prevNum ? `<a href="#puisi-${prevNum}">← Sebelumnya</a>` : `<span></span>`}
          <a href="#manifes">↑ Daftar Isi</a>
          ${nextNum ? `<a href="#puisi-${nextNum}">Berikutnya →</a>` : `<span></span>`}
        </div>
      </section>`;
  }

  document.getElementById('heroEyebrow').textContent = config.eyebrow;
  document.getElementById('heroTitle').innerHTML = config.title;
  document.getElementById('heroDesc').textContent = config.description;
  document.getElementById('statAngkatan').innerHTML = `${config.angkatanLabel} <b>${config.angkatanNumber}</b>`;
  document.getElementById('heroScrollHint').textContent = config.heroScrollHint;
  document.getElementById('manifesTitle').textContent = config.manifesTitle;
  document.getElementById('manifesDesc').textContent = config.manifesDesc;
  document.getElementById('footerTitle').textContent = config.footerTitle;
  document.getElementById('footerCredit').textContent = config.footerCredit;
  document.getElementById('messageText').textContent = config.messageText;
  document.getElementById('statCount').textContent = poems.length;

  document.getElementById('tocList').innerHTML = poems.map(renderTocRow).join('');
  document.getElementById('poemsContainer').innerHTML =
    poems.map((p, i) => renderPoemSection(p, i, poems.length)).join('');

  const searchInput = document.getElementById('searchInput');
  const emptyMsg = document.getElementById('emptyMsg');
  searchInput.addEventListener('input', () => {
    const q = searchInput.value.trim().toLowerCase();
    let visible = 0;
    document.querySelectorAll('.toc-row').forEach(row => {
      const match = row.dataset.title.includes(q) || row.dataset.author.includes(q);
      row.style.display = match ? '' : 'none';
      if (match) visible++;
    });
    emptyMsg.style.display = visible === 0 ? 'block' : 'none';
  });

  const stanzaObserver = new IntersectionObserver((entries) => {
    entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
  }, { threshold: 0.2 });
  document.querySelectorAll('.stanza-block').forEach(el => stanzaObserver.observe(el));

  const root = document.documentElement;
  const stops = [
    { p: 0.00, top:[86,190,245],  bottom:[255,224,178], sun:[255,214,102], glow:0.55 },
    { p: 0.20, top:[99,168,205],  bottom:[255,196,140], sun:[255,178,88],  glow:0.50 },
    { p: 0.42, top:[76,104,150],  bottom:[255,142,116], sun:[255,111,92],  glow:0.42 },
    { p: 0.62, top:[48,48,92],    bottom:[196,86,112],  sun:[224,74,74],   glow:0.28 },
    { p: 0.82, top:[22,22,54],    bottom:[74,32,82],    sun:[178,40,54],   glow:0.12 },
    { p: 1.00, top:[8,11,26],     bottom:[6,9,20],       sun:[178,40,54],   glow:0.00 }
  ];
  function lerp(a,b,t){ return a + (b-a)*t; }
  function lerpColor(c1,c2,t){
    return [Math.round(lerp(c1[0],c2[0],t)), Math.round(lerp(c1[1],c2[1],t)), Math.round(lerp(c1[2],c2[2],t))];
  }
  function rgb(c){ return `rgb(${c[0]}, ${c[1]}, ${c[2]})`; }
  function getStops(progress){
    for(let i=0;i<stops.length-1;i++){
      if(progress >= stops[i].p && progress <= stops[i+1].p){
        const local = (progress - stops[i].p) / (stops[i+1].p - stops[i].p);
        return { a: stops[i], b: stops[i+1], t: local };
      }
    }
    return { a: stops[stops.length-1], b: stops[stops.length-1], t: 0 };
  }
  function updateSky(){
    const maxScroll = document.documentElement.scrollHeight - window.innerHeight;
    const progress = maxScroll > 0 ? Math.min(Math.max(window.scrollY / maxScroll, 0), 1) : 0;
    const { a, b, t } = getStops(progress);
    const top = lerpColor(a.top, b.top, t);
    const bottom = lerpColor(a.bottom, b.bottom, t);
    const sun = lerpColor(a.sun, b.sun, t);
    const glow = lerp(a.glow, b.glow, t);

    root.style.setProperty('--sky-top', rgb(top));
    root.style.setProperty('--sky-bottom', rgb(bottom));
    root.style.setProperty('--sun-color', rgb(sun));
    root.style.setProperty('--sun-glow', `rgba(${sun[0]}, ${sun[1]}, ${sun[2]}, ${glow})`);

    const sunTop = lerp(6, 96, progress);
    root.style.setProperty('--sun-top', sunTop + '%');

    const sunOpacity = progress < 0.86 ? 1 : lerp(1, 0, (progress-0.86)/0.14);
    root.style.setProperty('--sun-opacity', sunOpacity);

    const moonOpacity = progress < 0.78 ? 0 : lerp(0, 1, (progress-0.78)/0.22);
    root.style.setProperty('--moon-opacity', Math.min(moonOpacity, 1));

    const starOpacity = progress < 0.4 ? 0 : lerp(0, 1, (progress-0.4)/0.5);
    root.style.setProperty('--star-opacity', Math.min(starOpacity, 1));
  }
  let ticking = false;
  window.addEventListener('scroll', () => {
    if (!ticking){ requestAnimationFrame(() => { updateSky(); ticking = false; }); ticking = true; }
  });
  window.addEventListener('resize', updateSky);
  updateSky();

  // ===== navigasi ala "halaman terpisah": tampilkan satu puisi saja, sembunyikan beranda =====
  const heroEl = document.getElementById('top');
  const manifesEl = document.getElementById('manifes');
  const messageEl = document.getElementById('pesanKesan');
  const moonSpacerEl = document.getElementById('moonSpacer');
  const allPoemSections = () => document.querySelectorAll('#poemsContainer .poem');

  function showPoemView(num){
    heroEl.style.display = 'none';
    manifesEl.style.display = 'none';
    messageEl.style.display = 'none';
    moonSpacerEl.style.display = 'none';
    allPoemSections().forEach(sec => {
      sec.style.display = (sec.id === 'puisi-' + num) ? '' : 'none';
    });
    window.scrollTo(0, 0);
    updateSky();
  }

  function showHomeView(scrollTargetId){
    heroEl.style.display = '';
    manifesEl.style.display = '';
    messageEl.style.display = '';
    moonSpacerEl.style.display = '';
    allPoemSections().forEach(sec => { sec.style.display = 'none'; });
    if (scrollTargetId){
      const el = document.getElementById(scrollTargetId);
      if (el){ el.scrollIntoView(); } else { window.scrollTo(0, 0); }
    } else {
      window.scrollTo(0, 0);
    }
    updateSky();
  }

  function applyRoute(){
    const hash = location.hash;
    const match = hash.match(/^#puisi-(\d+)$/);
    if (match){
      showPoemView(match[1]);
    } else if (hash === '#manifes'){
      showHomeView('manifes');
    } else {
      showHomeView();
    }
  }

  window.addEventListener('hashchange', applyRoute);
  applyRoute();
</script>
