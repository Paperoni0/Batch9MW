        <a href="main" style="display: inline-block; margin-top: 1.5rem; font-size: 0.9rem; color: #DCE9F5; text-decoration: none; border-bottom: 1px solid rgba(255,255,255,0.3); transition: color 0.25s ease, border-color 0.25s ease;">

      <div class="year-tag">2025 — 2026</div>

    <button onclick="toggleNav()" class="fab" aria-label="Quick actions">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <line id="navVerticalLine" x1="12" y1="5" x2="12" y2="19" />
        <line x1="5" y1="12" x2="19" y2="12" />
      </svg>
    </button>
    <script>
      function toggleNav() {
        const nav = document.querySelector('.class-list');
        const verticalLine = document.getElementById('navVerticalLine');
        nav.style.display = nav.style.display === 'none' ? 'block' : 'none';
        verticalLine.style.display = nav.style.display === 'none' ? 'block' : 'none';
      }

      document.addEventListener('DOMContentLoaded', () => {
        document.addEventListener('contextmenu', event => event.preventDefault());
        window.oncontextmenu = (event) => {
          event.preventDefault();
          event.stopPropagation();
          return false;
        };
      });
    </script>
  </body>
