    <style>
        .background {
            position: relative;
            width: 100%;
            height: 100vh;
            overflow: hidden;
        }

        .bg-image {
            position: absolute;
            background-size: cover;
            background-position: center;
            inset: 0;
        }

        .bg-overlay {
            position: absolute;
            background: linear-gradient(to right, rgba(0, 0, 0, 0.55) 0%, rgba(0, 0, 0, 0.25) 55%, rgba(0, 0, 0, 0.60) 100%);
            inset: 0;
        }
    </style>
</head>
<body>
    <div class="background">
        <img class="bg-image" src="assets/background.webp" alt="Maitreyawira School Palembang">
        <div class="bg-overlay"></div>
    </div>
