<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Redirecting to another page..." />
    <link rel="icon" href="/main/asset/image/logo/logo.ico" type="image/x-icon" />
    <meta http-equiv="refresh" content="3; url=https://xeversea.sytes.net/project/puisi" />
    <title>Redirecting...</title>
    <script src="/main/js/right.js"></script>
    <style>
        body {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @keyframes float {
            0%,
            50% {
                transform: translateY(-10px);
            }
            100% {
                transform: translateY(0);
            }
        }

        .box {
            text-align: center;
            color: black;
            padding: 40px 50px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            box-shadow: 0 0 60px rgba(0, 0, 0, 0.6);
            animation: float 4s ease-in-out infinite;
        }

        .box h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .box p {
            font-size: 16px;
            opacity: 0.75;
        }

        .spinner {
            margin: 25px auto;
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255, 255, 255, 0.15);
            border-top: 5px solid #38bdf8;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: #38bdf8;
            filter: blur(120px);
            opacity: 0.2;
            animation: pulse 5s infinite ease-in-out;
        }

        @keyframes pulse {
            0%,
            50% {
                transform: scale(1.3);
                opacity: 0.35;
            }
            100% {
                transform: scale(1);
                opacity: 0.2;
            }
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>Redirecting</h1>
        <div class="spinner"></div>
        <p>
            <strong>You are being redirected. If nothing happens, <a href="https://xeversea.sytes.net/project/puisi">click here</a>.</strong>
            <em>Code 301</em></p>
    </div>
    <script>
        setTimeout(function() {
            window.location.replace = "https://xeversea.sytes.net/project/puisi";
        }, 3000);
    </script>
</body>
</html>
